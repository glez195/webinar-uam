<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitud de Webinar — UAM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f3f4f6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#111;min-height:100vh;padding:2rem 1rem}
#wbr-wrap{max-width:700px;margin:0 auto}
#wbr-header{background:#fff;border-radius:16px 16px 0 0;border:.5px solid #e5e7eb;border-bottom:none;padding:16px 24px;display:flex;align-items:center;gap:12px}
#wbr-stepper-wrap{background:#fff;border:.5px solid #e5e7eb;border-bottom:none;padding:14px 24px 0}
#wbr-body{background:#fff;border:.5px solid #e5e7eb;border-bottom:none;padding:1.25rem 1.25rem 0}
#wbr-nav{background:#fff;border-radius:0 0 16px 16px;border:.5px solid #e5e7eb;padding:.875rem 1.25rem 1.25rem}
.wbr-card{border:.5px solid #e5e7eb;border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:.875rem}
.wbr-secttl{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.wbr-lbl{display:block;font-size:12px;font-weight:500;color:#4b5563;margin-bottom:4px}
.wbr-req::after{content:" *";color:#ef4444}
.wbr-fld{margin-bottom:.875rem}
.wbr-fld:last-child{margin-bottom:0}
.wbr-g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.wbr-g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:520px){.wbr-g2,.wbr-g3{grid-template-columns:1fr}}
.wbr-input{width:100%;padding:8px 10px;border:.5px solid #d1d5db;border-radius:8px;font-size:13px;color:#111;background:#fff;outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s}
.wbr-input:focus{border-color:#0E72ED;box-shadow:0 0 0 3px rgba(14,114,237,.12)}
.wbr-textarea{min-height:72px;resize:vertical}
.wbr-opt{display:flex;align-items:center;gap:8px;padding:8px 12px;border:.5px solid #e5e7eb;border-radius:8px;cursor:pointer;font-size:13px;color:#374151;margin-bottom:6px}
.wbr-opt:last-child{margin-bottom:0}
.wbr-opt:hover{background:#f9fafb}
.wbr-opt.on{border-color:#0E72ED;background:rgba(14,114,237,.06);color:#1d4ed8}
.wbr-opt input[type=radio]{accent-color:#0E72ED;width:auto;flex-shrink:0}
.wbr-cond{border-left:2px solid rgba(14,114,237,.35);padding-left:.875rem;margin-top:.75rem}
.wbr-step{display:flex;align-items:flex-start;margin-bottom:14px}
.wbr-stcol{display:flex;flex-direction:column;align-items:center}
.wbr-stc{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.wbr-stline{flex:1;margin-top:13px;height:1px;background:#e5e7eb}
.wbr-stlbl{font-size:10px;color:#9ca3af;margin-top:3px;white-space:nowrap}
.wbr-sc-done{background:#d1fae5;color:#065f46;border:.5px solid #6ee7b7}
.wbr-sc-active{background:#0E72ED;color:#fff}
.wbr-sc-pending{background:#f3f4f6;color:#9ca3af;border:.5px solid #e5e7eb}
.wbr-pan-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px}
.wbr-btn-sm{background:transparent;border:.5px solid #d1d5db;border-radius:8px;padding:7px 10px;cursor:pointer;color:#6b7280;font-size:12px;font-family:inherit}
.wbr-btn-sm:hover{background:#f9fafb}
.wbr-drop{border:1.5px dashed #d1d5db;border-radius:8px;padding:18px;text-align:center;cursor:pointer;color:#6b7280;font-size:13px}
.wbr-drop:hover{background:#f9fafb}
.wbr-drop.ok{border-color:#059669;background:#d1fae5;color:#065f46}
.wbr-rev-row{display:flex;gap:12px;padding:7px 0;border-bottom:.5px solid #f3f4f6;font-size:13px}
.wbr-rev-lbl{color:#6b7280;min-width:140px;flex-shrink:0}
.wbr-rev-val{color:#111;font-weight:500}
.wbr-folio{font-family:monospace;font-size:16px;font-weight:600;background:#f3f4f6;padding:10px 20px;border-radius:8px;display:inline-block;letter-spacing:.04em;color:#111}
.wbr-email-prev{background:#f9fafb;border-radius:8px;padding:14px;font-size:11px;font-family:monospace;white-space:pre-wrap;line-height:1.7;margin-top:8px;color:#374151;border:.5px solid #e5e7eb}
.wbr-badge{display:inline-flex;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px}
.wbr-info{border:.5px solid #bfdbfe;background:#eff6ff;border-radius:8px;padding:10px 14px;font-size:13px;color:#1e40af;margin-bottom:.875rem}
.wbr-tip{font-size:11px;color:#9ca3af;margin-top:4px}
.wbr-btn-primary{background:#0E72ED;color:#fff;border:none;border-radius:8px;padding:10px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s,opacity .15s}
.wbr-btn-primary:hover{background:#0B5EC7}
.wbr-btn-primary:disabled{opacity:.4;cursor:default;background:#0E72ED}
</style>
</head>
<body>
<div id="wbr-wrap">

  <!-- Encabezado -->
  <div id="wbr-header">
    <div style="width:34px;height:34px;background:#0E72ED;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:17px;flex-shrink:0">Z</div>
    <div>
      <div style="font-size:15px;font-weight:600;color:#111">Solicitud de Webinar</div>
      <div style="font-size:11px;color:#9ca3af">Zoom Webinars 500 &middot; UAM &middot; 2 licencias disponibles</div>
    </div>
  </div>

  <!-- Stepper -->
  <div id="wbr-stepper-wrap"><div id="wbr-stepper"></div></div>

  <!-- Contenido del paso -->
  <div id="wbr-body"></div>

  <!-- Navegación -->
  <div id="wbr-nav"></div>

</div>

<script>
(function(){

/* ── CONFIGURACIÓN ────────────────────────────────────────────── */
const WEBHOOK_URL = "https://hook.eu1.make.com/TU-URL-AQUI";
/* ─────────────────────────────────────────────────────────────── */

/* ── ESTADO ───────────────────────────────────────────────────── */
const st = {
  step: 1, submitted: false,
  nombre:"", economico:"", departamento:"", correo:"", correoConfirm:"", telefono:"",
  tema:"", descripcion:"", fecha:"", hora:"", duracion:"",
  panelistas: [{nombre:"", correo:""}],
  grabacion:"", grabTipo:"nube",
  dryRun:"", dryRunTipo:"dia",
  inscripcion:"", aprobacion:"auto",
  bannerName:"", solicitud:""
};

const HORAS = [];
for(let h=7;h<=21;h++){
  HORAS.push(pad(h)+":00");
  if(h<21) HORAS.push(pad(h)+":30");
}
const DURS = ["1 hora","1.5 horas","2 horas","2.5 horas","3 horas","3.5 horas","4 horas","4.5 horas","5 horas","5.5 horas","6 horas","Mayor a 6 horas"];

function pad(n){return String(n).padStart(2,"0")}
function todayStr(){const t=new Date();return t.getFullYear()+"-"+pad(t.getMonth()+1)+"-"+pad(t.getDate())}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

/* ── PASO Y VALIDACIÓN ────────────────────────────────────────── */
function maxStep(){return st.inscripcion==="no" ? 4 : 5;}

function getStepDefs(){
  const base=[{n:1,lbl:"Solicitante"},{n:2,lbl:"Webinar"},{n:3,lbl:"Técnico"}];
  if(st.inscripcion!=="no") base.push({n:4,lbl:"Inscripción"});
  base.push({n:maxStep(), lbl:"Revisión"});
  return base;
}

function canNext(){
  if(st.step===1){
    return !!(st.nombre && st.economico && st.departamento &&
              st.correo && st.correoConfirm &&
              st.correo===st.correoConfirm && st.telefono);
  }
  if(st.step===2){
    return !!(st.tema && st.descripcion && st.fecha && st.hora && st.duracion);
  }
  if(st.step===3){
    return !!(st.grabacion && st.dryRun && st.inscripcion);
  }
  return true;
}

/* Actualiza solo el botón siguiente sin re-renderizar todo */
function refreshBtn(){
  const btn = document.getElementById("wbr-next-btn");
  if(!btn) return;
  const ok = canNext();
  btn.disabled = !ok;
  btn.style.opacity = ok ? "1" : "0.4";
  btn.style.cursor  = ok ? "pointer" : "default";
}

/* Guardar valor y refrescar botón */
function sn(k,v){ st[k]=v; refreshBtn(); }
function setSt(k,v){ st[k]=v; render(); }

function nextStep(){
  const ms=maxStep();
  if(st.step===3 && st.inscripcion==="no") st.step=ms;
  else if(st.step<ms) st.step++;
  render();
}
function prevStep(){
  const ms=maxStep();
  if(st.step===ms && st.inscripcion==="no") st.step=3;
  else if(st.step>1) st.step--;
  render();
}

/* ── STEPPER ──────────────────────────────────────────────────── */
function renderStepper(){
  const defs=getStepDefs(); const cur=st.step;
  let h='<div class="wbr-step">';
  defs.forEach(function(d,i){
    const isDone = d.n<cur || (st.inscripcion==="no" && d.n<=3 && cur===maxStep());
    const isActive = d.n===cur;
    const cls = isDone?"wbr-sc-done" : isActive?"wbr-sc-active" : "wbr-sc-pending";
    const lbl = isDone ? "&#10003;" : String(i+1);
    h += '<div class="wbr-stcol">'
       + '<div class="wbr-stc '+cls+'">'+lbl+'</div>'
       + '<div class="wbr-stlbl">'+d.lbl+'</div>'
       + '</div>';
    if(i<defs.length-1){
      const lc = isDone ? "background:#6ee7b7" : isActive ? "background:#0E72ED" : "";
      h += '<div class="wbr-stline" style="'+lc+'"></div>';
    }
  });
  h += "</div>";
  document.getElementById("wbr-stepper").innerHTML = h;
}

/* ── PASO 1 — SOLICITANTE ─────────────────────────────────────── */
function renderStep1(){
  const emailErr = st.correo && st.correoConfirm && st.correo!==st.correoConfirm;
  return '<div class="wbr-card">'
    +'<div class="wbr-secttl">Información del solicitante</div>'
    +'<div class="wbr-g2">'
      +'<div class="wbr-fld"><label class="wbr-lbl wbr-req">Nombre completo</label>'
        +'<input class="wbr-input" type="text" id="f-nombre" value="'+esc(st.nombre)+'" placeholder="Nombre y apellidos"></div>'
      +'<div class="wbr-fld"><label class="wbr-lbl wbr-req">No. Económico</label>'
        +'<input class="wbr-input" type="text" id="f-economico" value="'+esc(st.economico)+'" placeholder="Ej. 12345"></div>'
    +'</div>'
    +'<div class="wbr-g2">'
      +'<div class="wbr-fld"><label class="wbr-lbl wbr-req">Departamento</label>'
        +'<input class="wbr-input" type="text" id="f-departamento" value="'+esc(st.departamento)+'" placeholder="Nombre del departamento"></div>'
      +'<div class="wbr-fld"><label class="wbr-lbl wbr-req">Teléfono / Extensión</label>'
        +'<input class="wbr-input" type="tel" id="f-telefono" value="'+esc(st.telefono)+'" placeholder="55 1234 5678 ext. 100"></div>'
    +'</div>'
    +'<div class="wbr-fld"><label class="wbr-lbl wbr-req">Correo electrónico</label>'
      +'<input class="wbr-input" type="email" id="f-correo" value="'+esc(st.correo)+'" placeholder="nombre@institucion.edu.mx"></div>'
    +'<div class="wbr-fld"><label class="wbr-lbl wbr-req">Confirmar correo</label>'
      +'<input class="wbr-input" type="email" id="f-correoConfirm" value="'+esc(st.correoConfirm)+'"'
        +(emailErr?' style="border-color:#ef4444"':'')+' placeholder="Repita su correo">'
      +(emailErr?'<div style="font-size:11px;color:#ef4444;margin-top:3px">Los correos no coinciden</div>':'')
    +'</div>'
  +'</div>';
}

function bindStep1(){
  var fields = ["nombre","economico","departamento","telefono","correo","correoConfirm"];
  fields.forEach(function(k){
    var el = document.getElementById("f-"+k);
    if(!el) return;
    el.addEventListener("input", function(){
      sn(k, this.value);
      /* Refrescar borde de confirmación en tiempo real */
      if(k==="correo"||k==="correoConfirm"){
        var corr = document.getElementById("f-correo");
        var conf = document.getElementById("f-correoConfirm");
        if(corr && conf){
          var err = corr.value && conf.value && corr.value!==conf.value;
          conf.style.borderColor = err ? "#ef4444" : "";
        }
      }
    });
  });
}

/* ── PASO 2 — WEBINAR (SIN CALENDARIO) ───────────────────────── */
function renderStep2(){
  var horaOpts = HORAS.map(function(h){
    return '<option value="'+h+'"'+(st.hora===h?" selected":"")+'>'+h+'</option>';
  }).join("");
  var durOpts = DURS.map(function(d){
    return '<option value="'+d+'"'+(st.duracion===d?" selected":"")+'>'+d+'</option>';
  }).join("");

  return '<div class="wbr-card">'
    +'<div class="wbr-secttl">Información del webinar</div>'
    +'<div class="wbr-fld"><label class="wbr-lbl wbr-req">Tema del webinar</label>'
      +'<input class="wbr-input" type="text" id="f-tema" value="'+esc(st.tema)+'" placeholder="Título del evento"></div>'
    +'<div class="wbr-fld"><label class="wbr-lbl wbr-req">Descripción del evento</label>'
      +'<textarea class="wbr-input wbr-textarea" id="f-descripcion" placeholder="Breve descripción del contenido y objetivos">'+esc(st.descripcion)+'</textarea></div>'
    +'<div class="wbr-g3">'
      +'<div class="wbr-fld"><label class="wbr-lbl wbr-req">Fecha</label>'
        +'<input class="wbr-input" type="date" id="f-fecha" value="'+st.fecha+'" min="'+todayStr()+'"></div>'
      +'<div class="wbr-fld"><label class="wbr-lbl wbr-req">Hora de inicio</label>'
        +'<select class="wbr-input" id="f-hora"><option value="">Seleccionar</option>'+horaOpts+'</select></div>'
      +'<div class="wbr-fld"><label class="wbr-lbl wbr-req">Duración</label>'
        +'<select class="wbr-input" id="f-duracion"><option value="">Seleccionar</option>'+durOpts+'</select></div>'
    +'</div>'
  +'</div>';
}

function bindStep2(){
  var map = {
    "f-tema":       ["tema","input"],
    "f-descripcion":["descripcion","input"],
    "f-fecha":      ["fecha","input"],
    "f-hora":       ["hora","change"],
    "f-duracion":   ["duracion","change"]
  };
  Object.keys(map).forEach(function(id){
    var el = document.getElementById(id);
    if(!el) return;
    el.addEventListener(map[id][1], function(){ sn(map[id][0], this.value); });
  });
}

/* ── PASO 3 — TÉCNICO ─────────────────────────────────────────── */
function renderPanelistas(){
  return st.panelistas.map(function(p,i){
    var rmBtn = st.panelistas.length>1
      ? '<button class="wbr-btn-sm" id="wbr-rm-'+i+'" style="color:#ef4444;margin-top:18px">&#x2715;</button>'
      : '<div style="height:36px;margin-top:18px"></div>';
    return '<div class="wbr-pan-row">'
      +'<div><label class="wbr-lbl">Nombre</label>'
        +'<input class="wbr-input" type="text" id="pan-n-'+i+'" value="'+esc(p.nombre)+'" placeholder="Nombre completo"></div>'
      +'<div><label class="wbr-lbl">Correo</label>'
        +'<input class="wbr-input" type="email" id="pan-c-'+i+'" value="'+esc(p.correo)+'" placeholder="correo@dominio.com"></div>'
      +'<div>'+rmBtn+'</div>'
    +'</div>';
  }).join("");
}

function bindPanelistas(){
  st.panelistas.forEach(function(_,i){
    var ni = document.getElementById("pan-n-"+i);
    var ci = document.getElementById("pan-c-"+i);
    var rm = document.getElementById("wbr-rm-"+i);
    if(ni) ni.addEventListener("input", function(){ st.panelistas[i].nombre=this.value; });
    if(ci) ci.addEventListener("input", function(){ st.panelistas[i].correo=this.value; });
    if(rm) rm.addEventListener("click", function(){
      st.panelistas.splice(i,1);
      document.getElementById("wbr-pan-list").innerHTML = renderPanelistas();
      bindPanelistas();
    });
  });
  var addBtn = document.getElementById("wbr-add-pan");
  if(addBtn) addBtn.addEventListener("click", function(){
    st.panelistas.push({nombre:"",correo:""});
    document.getElementById("wbr-pan-list").innerHTML = renderPanelistas();
    bindPanelistas();
  });
}

function renderStep3(){
  var grabCond = st.grabacion==="si"
    ? '<div class="wbr-cond">'
        +'<label class="wbr-lbl">Tipo de grabación</label>'
        +'<label class="wbr-opt'+(st.grabTipo==="nube"?" on":"")+'"><input type="radio" name="wbr-gtipo" value="nube"'+(st.grabTipo==="nube"?" checked":"")+'>  En la nube (Zoom Cloud)</label>'
        +'<label class="wbr-opt'+(st.grabTipo==="local"?" on":"")+'"><input type="radio" name="wbr-gtipo" value="local"'+(st.grabTipo==="local"?" checked":"")+'>  Local (computadora del anfitrión)</label>'
      +'</div>' : "";

  var dryCond = st.dryRun==="si"
    ? '<div class="wbr-cond">'
        +'<label class="wbr-lbl">¿Cuándo realizar la prueba?</label>'
        +'<label class="wbr-opt'+(st.dryRunTipo==="dia"?" on":"")+'"><input type="radio" name="wbr-drtipo" value="dia"'+(st.dryRunTipo==="dia"?" checked":"")+'>  Un día antes (horario por confirmar)</label>'
        +'<label class="wbr-opt'+(st.dryRunTipo==="15min"?" on":"")+'"><input type="radio" name="wbr-drtipo" value="15min"'+(st.dryRunTipo==="15min"?" checked":"")+'>  15 minutos antes del evento</label>'
      +'</div>' : "";

  return '<div class="wbr-card">'
    +'<div class="wbr-secttl">Panelistas / Expositores</div>'
    +'<p class="wbr-tip" style="margin-bottom:10px">Agrega los panelistas que necesitan permisos de coanfitrión.</p>'
    +'<div id="wbr-pan-list">'+renderPanelistas()+'</div>'
    +'<button class="wbr-btn-sm" id="wbr-add-pan" style="margin-top:6px">+ Agregar panelista</button>'
  +'</div>'
  +'<div class="wbr-card">'
    +'<div class="wbr-secttl">Configuración técnica</div>'
    +'<div class="wbr-fld">'
      +'<label class="wbr-lbl wbr-req">¿Se requiere grabación?</label>'
      +'<label class="wbr-opt'+(st.grabacion==="si"?" on":"")+'"><input type="radio" name="wbr-grab" value="si"'+(st.grabacion==="si"?" checked":"")+'>  Sí, requiero grabación</label>'
      +'<label class="wbr-opt'+(st.grabacion==="no"?" on":"")+'"><input type="radio" name="wbr-grab" value="no"'+(st.grabacion==="no"?" checked":"")+'>  No es necesario</label>'
      +grabCond
    +'</div>'
    +'<div class="wbr-fld">'
      +'<label class="wbr-lbl wbr-req">¿Sesión de prueba (Dry Run)?</label>'
      +'<p class="wbr-tip" style="margin-bottom:8px">Prueba de audio/video con el administrador antes del evento.</p>'
      +'<label class="wbr-opt'+(st.dryRun==="si"?" on":"")+'"><input type="radio" name="wbr-dry" value="si"'+(st.dryRun==="si"?" checked":"")+'>  Sí, requiero sesión de prueba</label>'
      +'<label class="wbr-opt'+(st.dryRun==="no"?" on":"")+'"><input type="radio" name="wbr-dry" value="no"'+(st.dryRun==="no"?" checked":"")+'>  No es necesario</label>'
      +dryCond
    +'</div>'
    +'<div class="wbr-fld">'
      +'<label class="wbr-lbl wbr-req">¿Se requiere inscripción al webinar?</label>'
      +'<label class="wbr-opt'+(st.inscripcion==="si"?" on":"")+'"><input type="radio" name="wbr-ins" value="si"'+(st.inscripcion==="si"?" checked":"")+'>  Sí, con página de registro</label>'
      +'<label class="wbr-opt'+(st.inscripcion==="no"?" on":"")+'"><input type="radio" name="wbr-ins" value="no"'+(st.inscripcion==="no"?" checked":"")+'>  No, acceso libre con liga</label>'
    +'</div>'
    +'<div class="wbr-fld">'
      +'<label class="wbr-lbl">Solicitud adicional</label>'
      +'<textarea class="wbr-input wbr-textarea" id="f-solicitud" placeholder="Cualquier requerimiento no contemplado...">'+esc(st.solicitud)+'</textarea>'
    +'</div>'
  +'</div>';
}

function bindStep3(){
  /* Radios que re-renderizan */
  function bindRadioRender(name, key){
    document.querySelectorAll('input[name="'+name+'"]').forEach(function(r){
      r.addEventListener("change", function(){ setSt(key, this.value); });
    });
  }
  bindRadioRender("wbr-grab",   "grabacion");
  bindRadioRender("wbr-gtipo",  "grabTipo");
  bindRadioRender("wbr-dry",    "dryRun");
  bindRadioRender("wbr-drtipo", "dryRunTipo");
  bindRadioRender("wbr-ins",    "inscripcion");

  var sol = document.getElementById("f-solicitud");
  if(sol) sol.addEventListener("input", function(){ st.solicitud=this.value; });

  bindPanelistas();
}

/* ── PASO 4 — INSCRIPCIÓN ─────────────────────────────────────── */
function renderStep4(){
  return '<div class="wbr-info">Esta sección aplica porque solicitaste <strong>inscripción con registro</strong>.</div>'
  +'<div class="wbr-card">'
    +'<div class="wbr-secttl">Tipo de aprobación</div>'
    +'<div class="wbr-fld">'
      +'<label class="wbr-opt'+(st.aprobacion==="auto"?" on":"")+'"><input type="radio" name="wbr-apr" value="auto"'+(st.aprobacion==="auto"?" checked":"")+'>  Automática — aprobación inmediata al registrarse</label>'
      +'<label class="wbr-opt'+(st.aprobacion==="manual"?" on":"")+'"><input type="radio" name="wbr-apr" value="manual"'+(st.aprobacion==="manual"?" checked":"")+'>  Manual — el anfitrión aprueba cada solicitud</label>'
      +'<label class="wbr-opt'+(st.aprobacion==="cerrado"?" on":"")+'"><input type="radio" name="wbr-apr" value="cerrado"'+(st.aprobacion==="cerrado"?" checked":"")+'>  Cerrada — solo invitados directos</label>'
    +'</div>'
  +'</div>'
  +'<div class="wbr-card">'
    +'<div class="wbr-secttl">Banner / Imagen del webinar</div>'
    +'<p class="wbr-tip" style="margin-bottom:10px">Imagen para la página de inscripción. Recomendado: 1280×720 px (JPG, PNG).</p>'
    +'<div class="wbr-drop'+(st.bannerName?" ok":"") +'" id="wbr-drop">'
      +'<input type="file" id="wbr-file" accept="image/*,.pdf,.ppt,.pptx" style="display:none">'
      +(st.bannerName
        ? '<div style="font-size:20px;margin-bottom:4px">&#10003;</div><strong>'+esc(st.bannerName)+'</strong><div style="font-size:11px;margin-top:4px">Clic para cambiar</div>'
        : '<div style="font-size:22px;margin-bottom:6px">&#11014;</div>Clic para seleccionar archivo<div style="font-size:11px;margin-top:4px">o arrastra aquí la imagen</div>')
    +'</div>'
  +'</div>';
}

function bindStep4(){
  document.querySelectorAll('input[name="wbr-apr"]').forEach(function(r){
    r.addEventListener("change", function(){ setSt("aprobacion", this.value); });
  });
  var drop = document.getElementById("wbr-drop");
  var fileIn = document.getElementById("wbr-file");
  if(drop) drop.addEventListener("click", function(){ if(fileIn) fileIn.click(); });
  if(fileIn) fileIn.addEventListener("change", function(){
    if(this.files && this.files[0]){ st.bannerName=this.files[0].name; render(); }
  });
}

/* ── PASO 5 — REVISIÓN ────────────────────────────────────────── */
function buildEmailBody(fecha, folio){
  var pans = st.panelistas.filter(function(p){return p.correo;})
                          .map(function(p){return p.correo;}).join(", ") || "Ninguno";
  return "ASUNTO: [NUEVA RESERVA] - Webinar Licencia 500 - "+fecha+"\n\n"
    +"DATOS DEL SOLICITANTE:\n"
    +"* Nombre: "+st.nombre+" | No. Económico: "+st.economico+" | Depto: "+st.departamento+"\n"
    +"* Correo: "+st.correo+" | Tel: "+st.telefono+"\n\n"
    +"DATOS DEL EVENTO:\n"
    +"* Tema: "+st.tema+"\n"
    +"* Fecha y Hora: "+fecha+" a las "+st.hora+" ("+st.duracion+")\n"
    +"* Inscripción: "+(st.inscripcion==="si"?"Sí - "+st.aprobacion : st.inscripcion==="no"?"No":"—")+"\n"
    +"* Panelistas: "+pans+"\n\n"
    +"NOTAS TÉCNICAS:\n"
    +"* Requiere grabación: "+(st.grabacion==="si"?"Sí ("+st.grabTipo+")" : st.grabacion==="no"?"No":"—")+"\n"
    +"* Sesión de práctica: "+(st.dryRun==="si"?"Sí ("+(st.dryRunTipo==="dia"?"día anterior":"15 min antes")+")" : st.dryRun==="no"?"No":"—")
    +(st.bannerName?"\n* Banner adjunto: "+st.bannerName:"")
    +(st.solicitud?"\n* Solicitud adicional: "+st.solicitud:"")
    +"\n\nFolio: "+folio;
}

function renderStep5(){
  var fecha = st.fecha ? st.fecha.split("-").reverse().join("/") : "—";
  var folio = "WEB-"+(st.economico||"000")+"-"+(st.fecha||"00000000").replace(/-/g,"");
  var pans  = st.panelistas.filter(function(p){return p.correo;});
  var emailBody = buildEmailBody(fecha, folio);

  return '<div class="wbr-card">'
    +'<div class="wbr-secttl">Revisión de solicitud</div>'
    +'<div class="wbr-rev-row"><div class="wbr-rev-lbl">Nombre</div><div class="wbr-rev-val">'+esc(st.nombre)+'</div></div>'
    +'<div class="wbr-rev-row"><div class="wbr-rev-lbl">No. Económico</div><div class="wbr-rev-val">'+esc(st.economico)+'</div></div>'
    +'<div class="wbr-rev-row"><div class="wbr-rev-lbl">Departamento</div><div class="wbr-rev-val">'+esc(st.departamento)+'</div></div>'
    +'<div class="wbr-rev-row"><div class="wbr-rev-lbl">Correo</div><div class="wbr-rev-val">'+esc(st.correo)+'</div></div>'
    +'<div class="wbr-rev-row"><div class="wbr-rev-lbl">Tema del webinar</div><div class="wbr-rev-val">'+esc(st.tema)+'</div></div>'
    +'<div class="wbr-rev-row"><div class="wbr-rev-lbl">Fecha y hora</div><div class="wbr-rev-val">'+fecha+' &middot; '+st.hora+' &middot; '+st.duracion+'</div></div>'
    +'<div class="wbr-rev-row"><div class="wbr-rev-lbl">Grabación</div><div class="wbr-rev-val">'+(st.grabacion==="si"?"Sí ("+st.grabTipo+")" : "No")+'</div></div>'
    +'<div class="wbr-rev-row"><div class="wbr-rev-lbl">Sesión de prueba</div><div class="wbr-rev-val">'+(st.dryRun==="si"?"Sí ("+(st.dryRunTipo==="dia"?"día anterior":"15 min antes")+")" : "No")+'</div></div>'
    +'<div class="wbr-rev-row"><div class="wbr-rev-lbl">Inscripción</div><div class="wbr-rev-val">'+(st.inscripcion==="si"?"Sí ("+st.aprobacion+")" : "No")+'</div></div>'
    +(pans.length ? '<div class="wbr-rev-row"><div class="wbr-rev-lbl">Panelistas</div><div class="wbr-rev-val">'+pans.map(function(p){return p.correo;}).join(", ")+'</div></div>' : "")
    +(st.bannerName ? '<div class="wbr-rev-row"><div class="wbr-rev-lbl">Banner</div><div class="wbr-rev-val">'+esc(st.bannerName)+'</div></div>' : "")
  +'</div>'
  +'<div class="wbr-card">'
    +'<div class="wbr-secttl">Vista previa del correo al administrador</div>'
    +'<p class="wbr-tip" style="margin-bottom:6px">Este contenido se enviará a través de Make a la bandeja del administrador.</p>'
    +'<div class="wbr-email-prev">'+esc(emailBody)+'</div>'
  +'</div>';
}

/* ── ENVÍO A MAKE ─────────────────────────────────────────────── */
function bindEnviar(){
  var btn = document.getElementById("wbr-send-btn");
  if(!btn) return;
  btn.addEventListener("click", async function(){
    btn.disabled = true;
    btn.textContent = "Enviando...";
    var fecha = st.fecha ? st.fecha.split("-").reverse().join("/") : "—";
    var folio = "WEB-"+(st.economico||"000")+"-"+(st.fecha||"00000000").replace(/-/g,"");
    var pans  = st.panelistas.filter(function(p){return p.correo;});
    var payload = {
      folio:            folio,
      asunto:           "[NUEVA RESERVA] - Webinar Licencia 500 - "+fecha,
      nombre:           st.nombre,
      economico:        st.economico,
      departamento:     st.departamento,
      correo:           st.correo,
      telefono:         st.telefono,
      tema:             st.tema,
      descripcion:      st.descripcion,
      fecha:            fecha,
      hora:             st.hora,
      duracion:         st.duracion,
      grabacion:        st.grabacion,
      grabTipo:         st.grabacion==="si" ? st.grabTipo : "",
      dryRun:           st.dryRun,
      dryRunTipo:       st.dryRun==="si" ? st.dryRunTipo : "",
      inscripcion:      st.inscripcion,
      aprobacion:       st.inscripcion==="si" ? st.aprobacion : "",
      bannerNombre:     st.bannerName || "",
      solicitud:        st.solicitud  || "",
      panelistas:       pans,
      panelistas_texto: pans.map(function(p){return p.nombre+" <"+p.correo+">";}).join(", ") || "Ninguno",
      timestamp:        new Date().toISOString()
    };
    try{
      var res = await fetch(WEBHOOK_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload)
      });
      if(res.ok){ st.submitted=true; render(); }
      else throw new Error("HTTP "+res.status);
    }catch(e){
      btn.disabled = false;
      btn.textContent = "Enviar solicitud";
      alert("Error al enviar. Verifica tu conexión e intenta de nuevo.\n("+e.message+")");
    }
  });
}

/* ── PANTALLA DE ÉXITO ────────────────────────────────────────── */
function renderSuccess(){
  var folio = "WEB-"+(st.economico||"000")+"-"+(st.fecha||"00000000").replace(/-/g,"");
  var fecha  = st.fecha ? st.fecha.split("-").reverse().join("/") : "—";
  return '<div style="text-align:center;padding:2.5rem 1rem">'
    +'<div style="width:60px;height:60px;background:#d1fae5;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:28px;border:.5px solid #6ee7b7">&#10003;</div>'
    +'<h2 style="font-size:19px;font-weight:600;color:#111;margin-bottom:8px">&#161;Solicitud enviada con éxito!</h2>'
    +'<p style="font-size:13px;color:#6b7280;margin-bottom:14px">Tu número de folio de seguimiento es:</p>'
    +'<div class="wbr-folio">'+folio+'</div>'
    +'<p style="font-size:13px;color:#6b7280;margin-top:16px;max-width:400px;margin-left:auto;margin-right:auto">'
      +'El administrador recibirá tu solicitud y te contactará a <strong>'+esc(st.correo)+'</strong> para confirmar la disponibilidad y los detalles.</p>'
    +'<div style="margin-top:24px;padding-top:20px;border-top:.5px solid #f3f4f6">'
      +'<div class="wbr-card" style="text-align:left;max-width:400px;margin:0 auto">'
        +'<div class="wbr-secttl">Resumen</div>'
        +'<div class="wbr-rev-row"><div class="wbr-rev-lbl">Webinar</div><div class="wbr-rev-val">'+esc(st.tema)+'</div></div>'
        +'<div class="wbr-rev-row"><div class="wbr-rev-lbl">Fecha solicitada</div><div class="wbr-rev-val">'+fecha+' &middot; '+st.hora+'</div></div>'
        +'<div class="wbr-rev-row" style="border:none"><div class="wbr-rev-lbl">Duración</div><div class="wbr-rev-val">'+st.duracion+'</div></div>'
      +'</div>'
    +'</div>'
    +'<button id="wbr-reset-btn" style="margin-top:20px;background:transparent;border:.5px solid #d1d5db;border-radius:8px;padding:8px 20px;cursor:pointer;font-size:13px;color:#6b7280;font-family:inherit">Nueva solicitud</button>'
  +'</div>';
}

/* ── RENDER PRINCIPAL ─────────────────────────────────────────── */
function render(){
  var ms = maxStep();

  if(st.submitted){
    document.getElementById("wbr-stepper").innerHTML = "";
    document.getElementById("wbr-body").innerHTML    = renderSuccess();
    document.getElementById("wbr-nav").innerHTML     = "";
    var rb = document.getElementById("wbr-reset-btn");
    if(rb) rb.addEventListener("click", function(){
      Object.assign(st,{step:1,submitted:false,nombre:"",economico:"",departamento:"",correo:"",correoConfirm:"",telefono:"",tema:"",descripcion:"",fecha:"",hora:"",duracion:"",panelistas:[{nombre:"",correo:""}],grabacion:"",grabTipo:"nube",dryRun:"",dryRunTipo:"dia",inscripcion:"",aprobacion:"auto",bannerName:"",solicitud:""});
      render();
    });
    return;
  }

  renderStepper();

  var body = "";
  if(st.step===1) body = renderStep1();
  else if(st.step===2) body = renderStep2();
  else if(st.step===3) body = renderStep3();
  else if(st.step===4 && st.inscripcion!=="no") body = renderStep4();
  else body = renderStep5();
  document.getElementById("wbr-body").innerHTML = body;

  /* Bindings por paso */
  if(st.step===1) bindStep1();
  if(st.step===2) bindStep2();
  if(st.step===3) bindStep3();
  if(st.step===4 && st.inscripcion!=="no") bindStep4();

  var ok     = canNext();
  var isLast = st.step===ms;

  document.getElementById("wbr-nav").innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center">'
    +(st.step>1 ? '<button class="wbr-btn-sm" id="wbr-prev-btn" style="font-size:13px;padding:8px 18px">&#8592; Anterior</button>' : '<div></div>')
    +(isLast
        ? '<button class="wbr-btn-primary" id="wbr-send-btn">Enviar solicitud</button>'
        : '<button class="wbr-btn-primary" id="wbr-next-btn"'+(ok?'':' disabled style="opacity:.4;cursor:default"')+'>Siguiente &#8594;</button>')
    +'</div>';

  var prevBtn = document.getElementById("wbr-prev-btn");
  if(prevBtn) prevBtn.addEventListener("click", prevStep);

  var nextBtn = document.getElementById("wbr-next-btn");
  if(nextBtn) nextBtn.addEventListener("click", function(){ if(canNext()) nextStep(); });

  bindEnviar();
}

render();
})();
</script>
